<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script>
    (function(){
      var k='mc.theme.v1',s;
      try{s=localStorage.getItem(k)}catch(e){console.warn('Failed to read theme from localStorage:',e)}
      var m=(s==='dark'||s==='light')?s:
        (window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
      document.documentElement.className=m;
      document.documentElement.setAttribute('data-theme',m);
    })();
  </script>
  <title>MADCreate — Build the future</title>
  <base href="/" />
