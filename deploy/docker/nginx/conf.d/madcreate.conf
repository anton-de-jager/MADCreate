# --- madcreate.madleads.ai (frontend + dynamic site rendering) ---
upstream madcreate_web {
  server web:80;
}

# --- madcreateapi.madleads.ai ---
upstream madcreate_api {
  server api:3000;
}

server {
  listen 80;
  server_name madcreate.madleads.ai;

  # All /:slug routes are tenant sites, handled by the Angular SSR/SPA shell.
  location / {
    proxy_pass http://madcreate_web;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
  }
}

server {
  listen 80;
  server_name madcreateapi.madleads.ai;

  location / {
    proxy_pass http://madcreate_api;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300;
  }
}

# --- Wildcard catch-all for tenant custom domains ---
# DNS for the tenant domain must CNAME to madcreate.madleads.ai.
# The Angular app reads the Host header (forwarded as X-Forwarded-Host)
# and asks the API which tenant owns it.
server {
  listen 80 default_server;
  server_name _;

  location / {
    proxy_pass http://madcreate_web;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Tenant-Domain   $host;
  }
}
