# Inside the `web` container. Serves the built Angular SPA.
# The Angular Router handles all paths (incl. /:slug for tenant sites).
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long cache for fingerprinted assets
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|webp|avif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # Health probe for the container
  location = /__health {
    access_log off;
    return 200 "ok\n";
  }
}
