<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName madcreate.madprospects.com
# -- ACME HTTP-01 challenge -- must come BEFORE ProxyPass/FallbackResource
    Alias /.well-known/acme-challenge/ /var/www/letsencrypt/.well-known/acme-challenge/
    <Directory /var/www/letsencrypt/.well-known/acme-challenge>
        Options None
        AllowOverride None
        Require all granted
    </Directory>
    ProxyPass /.well-known/acme-challenge/ !

    DocumentRoot /home/madcreate.madprospects.com

    <Directory /home/madcreate.madprospects.com>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    <FilesMatch "\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    <FilesMatch "\.(html|json|webmanifest)$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/madcreate.madprospects.com.error.log
    CustomLog ${APACHE_LOG_DIR}/madcreate.madprospects.com.access.log combined

SSLCertificateFile /etc/letsencrypt/live/madcreate.madprospects.com/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/madcreate.madprospects.com/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
