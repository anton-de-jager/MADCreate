<VirtualHost *:80>
    ServerName madcreateapi.madprospects.com
# -- ACME HTTP-01 challenge -- must come BEFORE ProxyPass/FallbackResource
    Alias /.well-known/acme-challenge/ /var/www/letsencrypt/.well-known/acme-challenge/
    <Directory /var/www/letsencrypt/.well-known/acme-challenge>
        Options None
        AllowOverride None
        Require all granted
    </Directory>
    ProxyPass /.well-known/acme-challenge/ !
    ProxyPreserveHost On
    ProxyRequests Off

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:3005/$1 [P,L]

    ProxyPass / http://127.0.0.1:3005/
    ProxyPassReverse / http://127.0.0.1:3005/

    Timeout 300
    ProxyTimeout 300

    ErrorLog ${APACHE_LOG_DIR}/madcreateapi.madprospects.com.error.log
    CustomLog ${APACHE_LOG_DIR}/madcreateapi.madprospects.com.access.log combined
RewriteCond %{SERVER_NAME} =madcreateapi.madprospects.com
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
