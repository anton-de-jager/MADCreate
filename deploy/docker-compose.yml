# MADCreate — local development & single-host deployment
# For multi-host / k8s, treat this as a reference topology.

services:
  mysql:
    image: mysql:8.4
    container_name: madcreate-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-madcreate}
      MYSQL_USER: ${MYSQL_USER:-madcreate}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-madcreate}
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=500
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../database/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-changeme_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - madcreate-net

  redis:
    image: redis:7-alpine
    container_name: madcreate-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - madcreate-net

  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    container_name: madcreate-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-madcreate}:${MYSQL_PASSWORD:-madcreate}@mysql:3306/${MYSQL_DATABASE:-madcreate}
      REDIS_URL: redis://redis:6379
      API_HOST: 0.0.0.0
      API_PORT: 4213
    ports:
      - "4213:4213"
    volumes:
      - ../storage:/app/storage
    networks:
      - madcreate-net

  web:
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
    container_name: madcreate-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3013:80"
    environment:
      WEB_API_BASE_URL: ${WEB_API_BASE_URL:-http://api:4213/v1}
    networks:
      - madcreate-net

  nginx:
    image: nginx:1.27-alpine
    container_name: madcreate-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    networks:
      - madcreate-net

volumes:
  mysql-data:
  redis-data:

networks:
  madcreate-net:
    driver: bridge
