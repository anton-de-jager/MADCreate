# MADCreate — local development & single-host deployment
# For multi-host / k8s, treat this as a reference topology.

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: madcreate-mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-P@szw0rdMP!Local}
      MSSQL_DATABASE: ${MSSQL_DATABASE:-madcreate}
      MSSQL_USER: ${MSSQL_USER:-madcreate}
      MSSQL_PASSWORD: ${MSSQL_PASSWORD:-madcreate}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - madcreate-net

  redis:
    image: redis:7-alpine
    container_name: madcreate-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - madcreate-net

  api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
    container_name: madcreate-api
    restart: unless-stopped
    depends_on:
      mssql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: sqlserver://mssql:1433;database=${MSSQL_DATABASE:-madcreate};user=${MSSQL_USER:-madcreate};password=${MSSQL_PASSWORD:-madcreate};trustServerCertificate=true
      REDIS_URL: redis://redis:6379
      API_HOST: 0.0.0.0
      API_PORT: 4213
    ports:
      - "4213:4213"
    volumes:
      - ../storage:/app/storage
    networks:
      - madcreate-net

  web:
    build:
      context: ..
      dockerfile: deploy/docker/web.Dockerfile
    container_name: madcreate-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3013:80"
    environment:
      WEB_API_BASE_URL: ${WEB_API_BASE_URL:-http://api:4213/v1}
    networks:
      - madcreate-net

  nginx:
    image: nginx:1.27-alpine
    container_name: madcreate-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    networks:
      - madcreate-net

volumes:
  mssql-data:
  redis-data:

networks:
  madcreate-net:
    driver: bridge
