<VirtualHost *:80>
    ServerName madcreate.madleads.ai
# -- ACME HTTP-01 challenge -- must come BEFORE ProxyPass/FallbackResource
    Alias /.well-known/acme-challenge/ /var/www/letsencrypt/.well-known/acme-challenge/
    <Directory /var/www/letsencrypt/.well-known/acme-challenge>
        Options None
        AllowOverride None
        Require all granted
    </Directory>
    ProxyPass /.well-known/acme-challenge/ !

    DocumentRoot /home/madproducts/madcreate.madleads.ai

    <Directory /home/madproducts/madcreate.madleads.ai>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    <FilesMatch "\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    <FilesMatch "\.(html|json|webmanifest)$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/madcreate.madleads.ai.error.log
    CustomLog ${APACHE_LOG_DIR}/madcreate.madleads.ai.access.log combined
RewriteEngine on
RewriteCond %{SERVER_NAME} =madcreate.madleads.ai
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
